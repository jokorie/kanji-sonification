<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sonic Kanji</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --accent: #c9463d;
      --accent-glow: rgba(201, 70, 61, 0.4);
      --ink: #e8e4dc;
      --ink-dim: rgba(232, 228, 220, 0.5);
      --grid: rgba(232, 228, 220, 0.06);
      --success: #4a9c6d;
      --warning: #d4a84b;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      background: var(--bg-primary);
      font-family: 'Noto Serif JP', serif;
    }

    body {
      display: flex;
      flex-direction: column;
      background: 
        radial-gradient(ellipse at 50% 0%, rgba(201, 70, 61, 0.08) 0%, transparent 50%),
        linear-gradient(180deg, var(--bg-primary) 0%, #0a0a0a 100%);
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(232, 228, 220, 0.08);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: 0.1em;
    }

    .logo span {
      color: var(--accent);
    }

    /* Status indicator */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--ink-dim);
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warning);
      box-shadow: 0 0 8px var(--warning);
      transition: all 0.3s ease;
    }

    .status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
    }

    .status-dot.active {
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }

    /* Canvas container */
    .canvas-container {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 1;
      max-height: calc(100vh - 180px);
    }

    /* Grid overlay */
    .grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.5;
    }

    .grid-overlay::before,
    .grid-overlay::after {
      content: '';
      position: absolute;
      background: var(--grid);
    }

    .grid-overlay::before {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
    }

    .grid-overlay::after {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      background: var(--bg-secondary);
      border: 1px solid rgba(232, 228, 220, 0.1);
      border-radius: 4px;
      cursor: crosshair;
    }

    /* Footer controls */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-top: 1px solid rgba(232, 228, 220, 0.08);
    }

    .stats {
      display: flex;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-dim);
      letter-spacing: 0.02em;
    }

    .stat-label {
      opacity: 0.6;
      margin-right: 6px;
    }

    .stat-value {
      color: var(--ink);
    }

    button {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 10px 24px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--accent);
      color: var(--bg-primary);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Template selector */
    .template-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .kanji-select {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.5rem;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border: 1px solid rgba(232, 228, 220, 0.15);
      border-radius: 2px;
      color: var(--ink);
      cursor: pointer;
      min-width: 60px;
      text-align: center;
    }

    .kanji-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .kanji-select option {
      font-size: 1.2rem;
      padding: 8px;
    }

    .play-btn {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .play-btn.playing {
      background: var(--accent);
      color: var(--bg-primary);
    }

    /* Pressure indicator */
    .pressure-bar {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 120px;
      background: rgba(232, 228, 220, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .pressure-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, var(--accent), var(--warning));
      border-radius: 2px;
      transition: height 0.05s ease-out;
    }

    /* Init modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal.visible {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid rgba(232, 228, 220, 0.1);
      padding: 48px;
      max-width: 400px;
      width: 90%;
      border-radius: 4px;
      text-align: center;
    }

    .modal h2 {
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--ink);
      margin-bottom: 16px;
      letter-spacing: 0.1em;
    }

    .modal p {
      font-size: 0.9rem;
      color: var(--ink-dim);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .modal button {
      width: 100%;
      padding: 16px 32px;
      font-size: 1rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      header, footer {
        padding: 12px 16px;
      }

      .logo {
        font-size: 1.25rem;
      }

      .stats {
        gap: 12px;
        font-size: 0.65rem;
      }

      .canvas-container {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">SONIC <span>漢字</span></div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">TAP TO START</span>
    </div>
  </header>

  <div class="canvas-container">
    <div class="canvas-wrapper">
      <div class="grid-overlay"></div>
      <canvas id="canvas"></canvas>
    </div>
    <div class="pressure-bar">
      <div class="pressure-fill" id="pressureFill"></div>
    </div>
  </div>

  <footer>
    <div class="stats">
      <div>
        <span class="stat-label">POINTS</span>
        <span class="stat-value" id="pointCount">0</span>
      </div>
      <div>
        <span class="stat-label">PRESSURE</span>
        <span class="stat-value" id="pressureValue">0.00</span>
      </div>
      <div>
        <span class="stat-label">FREQ</span>
        <span class="stat-value" id="frequencyValue">--</span>
      </div>
    </div>
    <div class="template-controls">
      <select id="kanjiSelect" class="kanji-select">
        <option value="" selected>—</option>
        <option value="一">一</option>
        <option value="二">二</option>
        <option value="三">三</option>
        <option value="人">人</option>
        <option value="大">大</option>
        <option value="日">日</option>
        <option value="月">月</option>
        <option value="山">山</option>
        <option value="川">川</option>
        <option value="木">木</option>
        <option value="火">火</option>
      </select>
      <button id="playBtn" class="play-btn">▶ PLAY</button>
      <button id="clearBtn">CLEAR</button>
    </div>
  </footer>

  <!-- Audio initialization modal (required due to browser autoplay policy) -->
  <div class="modal visible" id="initModal">
    <div class="modal-content">
      <h2>Sonic 漢字</h2>
      <p>Draw kanji with Apple Pencil and hear them come to life. Sound is generated locally on your device.</p>
      <button id="initAudioBtn">ENABLE AUDIO</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
